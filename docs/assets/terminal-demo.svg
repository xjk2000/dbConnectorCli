<svg width="1160" height="560" viewBox="0 0 1160 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="dbConnector CLI terminal demo">
  <rect width="1160" height="560" rx="18" fill="#111827"/>
  <rect x="0" y="0" width="1160" height="56" rx="18" fill="#1F2937"/>
  <circle cx="32" cy="28" r="8" fill="#EF4444"/>
  <circle cx="58" cy="28" r="8" fill="#F59E0B"/>
  <circle cx="84" cy="28" r="8" fill="#10B981"/>
  <text x="580" y="35" text-anchor="middle" fill="#D1D5DB" font-family="SFMono-Regular, Consolas, Liberation Mono, monospace" font-size="16">dbConnector CLI</text>

  <text x="42" y="100" fill="#93C5FD" font-family="SFMono-Regular, Consolas, Liberation Mono, monospace" font-size="18">$ dbc profile list</text>
  <text x="42" y="135" fill="#D1FAE5" font-family="SFMono-Regular, Consolas, Liberation Mono, monospace" font-size="16">{ "ok": true, "profiles": [ "prod-readonly-mysql", "cache-redis" ] }</text>

  <text x="42" y="190" fill="#93C5FD" font-family="SFMono-Regular, Consolas, Liberation Mono, monospace" font-size="18">$ dbc mysql count --profile prod-readonly-mysql --database app --table tickets</text>
  <text x="42" y="225" fill="#D1FAE5" font-family="SFMono-Regular, Consolas, Liberation Mono, monospace" font-size="16">{ "ok": true, "type": "mysql_count", "count": 9812 }</text>

  <text x="42" y="280" fill="#93C5FD" font-family="SFMono-Regular, Consolas, Liberation Mono, monospace" font-size="18">$ dbc redis count --profile cache-redis --db 0 --pattern "session:*"</text>
  <text x="42" y="315" fill="#D1FAE5" font-family="SFMono-Regular, Consolas, Liberation Mono, monospace" font-size="16">{ "ok": true, "type": "redis_count", "db": 0, "count": 421, "truncated": false }</text>

  <text x="42" y="370" fill="#93C5FD" font-family="SFMono-Regular, Consolas, Liberation Mono, monospace" font-size="18">$ dbc mysql exec --profile prod-readonly-mysql --sql "delete from tickets" </text>
  <text x="42" y="405" fill="#FCA5A5" font-family="SFMono-Regular, Consolas, Liberation Mono, monospace" font-size="16">{ "ok": false, "error": { "code": "WRITE_NOT_ALLOWED" } }</text>

  <rect x="42" y="452" width="1076" height="66" rx="12" fill="#172554" stroke="#2563EB"/>
  <text x="68" y="482" fill="#BFDBFE" font-family="SFMono-Regular, Consolas, Liberation Mono, monospace" font-size="16">JSON-first database access for AI agents</text>
  <text x="68" y="508" fill="#DBEAFE" font-family="SFMono-Regular, Consolas, Liberation Mono, monospace" font-size="15">Safe by default: read-only exploration, explicit writes, masked credentials, predictable errors.</text>
</svg>
